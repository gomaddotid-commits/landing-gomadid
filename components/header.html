<!-- Floating Header (Dynamic Island Style) -->
<header class="floating-header mt-6">
    <div class="floating-header-inner">
        <!-- Logo -->
        <a href="#/" class="flex items-center gap-2 flex-shrink-0" onclick="router.load('/'); mobileMenu.close();">
            <img id="header-logo" src="/assets/images/logo-merah.png" alt="GoMad" class="h-8 md:h-10 w-auto transition-all duration-300">
        </a>
        
        <!-- Desktop Navigation -->
        <nav class="hidden lg:flex items-center gap-6">
            <a href="#/" class="nav-link active">Beranda</a>
            <a href="#/platform" class="nav-link">Platform</a>
            <a href="#/agency" class="nav-link">Untuk Agency</a>
            <a href="#/customer" class="nav-link">Untuk Customer</a>
            <a href="#/docs" class="nav-link">Dokumentasi</a>
        </nav>
        
        <!-- Right Actions -->
        <div class="flex items-center gap-3">
            <!-- CTA Button -->
            <a href="https://web.gomad.id" target="_blank" 
               class="hidden md:inline-flex items-center gap-2 bg-[#C1121F] text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-[#8A0F18] transition-all hover:scale-105 active:scale-95">
                Booking Sekarang
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </a>
            
            <!-- Theme Toggle (Desktop) -->
            <button onclick="theme.toggle()" 
                    class="hidden md:flex w-10 h-10 items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"
                    aria-label="Toggle theme">
                <svg class="w-5 h-5 dark:hidden text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
                <svg class="w-5 h-5 hidden dark:block text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
            </button>
            
            <!-- Mobile Menu Toggle -->
            <button id="mobile-menu-btn" 
                    class="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"
                    aria-label="Menu">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>
    </div>
</header>

<!-- Mobile Menu Overlay -->
<div id="mobile-overlay" class="mobile-menu-overlay"></div>

<!-- Mobile Menu Drawer -->
<div id="mobile-drawer" class="mobile-menu-drawer">
    <div class="p-6">
        <!-- Drawer Header -->
        <div class="flex items-center justify-between mb-8">
            <img src="/assets/images/logo-merah.png" alt="GoMad" class="h-8 w-auto" id="mobile-logo">
            <button id="mobile-drawer-close" 
                    class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"
                    aria-label="Close menu">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        
        <!-- Mobile Nav Links -->
        <nav class="flex flex-col gap-4">
            <a href="#/" class="text-lg font-medium text-gray-700 dark:text-gray-300 hover:text-[#C1121F] dark:hover:text-[#C1121F] transition-colors py-2 border-b border-gray-100 dark:border-gray-800" onclick="router.load('/'); mobileMenu.close();">
                🏠 Beranda
            </a>
            <a href="#/platform" class="text-lg font-medium text-gray-700 dark:text-gray-300 hover:text-[#C1121F] dark:hover:text-[#C1121F] transition-colors py-2 border-b border-gray-100 dark:border-gray-800" onclick="router.load('/platform'); mobileMenu.close();">
                🚀 Platform
            </a>
            <a href="#/agency" class="text-lg font-medium text-gray-700 dark:text-gray-300 hover:text-[#C1121F] dark:hover:text-[#C1121F] transition-colors py-2 border-b border-gray-100 dark:border-gray-800" onclick="router.load('/agency'); mobileMenu.close();">
                🏢 Untuk Agency
            </a>
            <a href="#/customer" class="text-lg font-medium text-gray-700 dark:text-gray-300 hover:text-[#C1121F] dark:hover:text-[#C1121F] transition-colors py-2 border-b border-gray-100 dark:border-gray-800" onclick="router.load('/customer'); mobileMenu.close();">
                👤 Untuk Customer
            </a>
            <a href="#/docs" class="text-lg font-medium text-gray-700 dark:text-gray-300 hover:text-[#C1121F] dark:hover:text-[#C1121F] transition-colors py-2 border-b border-gray-100 dark:border-gray-800" onclick="router.load('/docs'); mobileMenu.close();">
                📚 Dokumentasi
            </a>
            <a href="#/contact" class="text-lg font-medium text-gray-700 dark:text-gray-300 hover:text-[#C1121F] dark:hover:text-[#C1121F] transition-colors py-2 border-b border-gray-100 dark:border-gray-800" onclick="router.load('/contact'); mobileMenu.close();">
                📞 Kontak
            </a>
        </nav>
        
        <!-- Mobile CTA -->
        <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-800">
            <a href="https://web.gomad.id" target="_blank" 
               class="block w-full text-center bg-[#C1121F] text-white py-3 rounded-xl font-semibold hover:bg-[#8A0F18] transition mb-3">
                Booking Sekarang →
            </a>
            
            <!-- Mobile Theme Toggle -->
            <button onclick="theme.toggle()" 
                    class="w-full flex items-center justify-center gap-2 py-3 rounded-xl bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 font-medium hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                <span id="mobile-theme-icon">🌙</span>
                <span id="mobile-theme-text">Dark Mode</span>
            </button>
        </div>
    </div>
</div>
